version: '3.8'

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DATABASE_URL=sqlite:///./discboard.db
      - SECRET_KEY=${SECRET_KEY:-discboard-secret-key}
      - UPTIME_KUMA_URL=${UPTIME_KUMA_URL:-http://172.20.0.5:3001}
      - UPTIME_KUMA_API_KEY=${UPTIME_KUMA_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG:-BMillerCodes}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Dashboard
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  # Discord Bot (optional - run separately or with api)
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - bot

volumes:
  data: